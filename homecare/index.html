<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#fff;color:#1a1a1a;line-height:1.8;font-size:15px;}
.page{max-width:700px;margin:0 auto;padding:48px 20px 100px;}
.eyebrow{font-size:11px;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
h1{font-size:26px;font-weight:700;line-height:1.3;margin-bottom:10px;}
.lead{font-size:14px;color:#555;border-bottom:1px solid #eee;padding-bottom:24px;margin-bottom:32px;}
.domain-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.dl-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border:2px solid #e5e5e5;border-radius:10px;background:#fff;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit;width:100%;}
.dl-btn:hover{border-color:#93c5fd;background:#f8faff;}
.dl-btn.active{border-color:#1d4ed8;background:#eff6ff;}
.dl-icon{font-size:22px;flex-shrink:0;}
.dl-info{flex:1;}
.dl-title{font-size:14px;font-weight:700;color:#111;}
.dl-sub{font-size:11px;color:#999;margin-top:2px;}
.dl-time{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#fef3c7;color:#92400e;flex-shrink:0;white-space:nowrap;}
.dl-btn.active .dl-time{background:#dbeafe;color:#1d4ed8;}
.demo-win{border:1.5px solid #e0e0e0;border-radius:12px;overflow:hidden;display:none;}
.demo-win.show{display:block;}
.demo-bar{background:#1e3a8a;padding:14px 18px;color:#fff;}
.db-label{font-size:10px;font-weight:700;letter-spacing:.5px;opacity:.6;margin-bottom:4px;}
.db-title{font-size:15px;font-weight:700;}
.db-docs{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.db-doc{font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.15);}
.demo-body{padding:16px 18px;background:#fafaf9;}
.task-label{font-size:10px;font-weight:700;letter-spacing:.5px;color:#aaa;margin-bottom:5px;}
.task-text{background:#fff;border:1.5px solid #e5e5e5;border-radius:8px;padding:10px 14px;font-size:13px;color:#444;line-height:1.65;margin-bottom:16px;}
.agents-col{display:flex;flex-direction:column;gap:8px;}
.ag{border:1.5px solid #e5e5e5;border-radius:9px;overflow:hidden;background:#fff;transition:border-color .3s,box-shadow .3s;}
.ag.running{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.ag.done{border-color:#22c55e;}
.ag-head{display:flex;align-items:center;gap:8px;padding:9px 12px;}
.ag-dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;transition:background .3s;}
.ag.running .ag-dot{background:#3b82f6;animation:pulse .8s infinite;}
.ag.done .ag-dot{background:#22c55e;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
.ag-role{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.ag-name{font-size:13px;font-weight:700;color:#111;flex:1;}
.ag-st{font-size:11px;color:#aaa;margin-left:auto;}
.ag.running .ag-st{color:#3b82f6;}
.ag.done .ag-st{color:#22c55e;font-weight:700;}
.ag-out{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.ag.done .ag-out{max-height:400px;}
.ag-out-inner{padding:0 12px 10px 12px;border-top:1px solid #f0f0f0;}
.ag-doc{margin-top:8px;background:#f8faff;border:1px solid #bfdbfe;border-radius:7px;padding:9px 12px;}
.ag-doc-label{font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:5px;letter-spacing:.3px;}
.ag-doc-text{font-size:12px;color:#334155;line-height:1.8;white-space:pre-wrap;font-family:menlo,monospace;}
.result-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:14px 16px;margin-top:14px;display:none;}
.result-box.show{display:block;}
.rb-label{font-size:11px;font-weight:700;color:#15803d;margin-bottom:6px;letter-spacing:.3px;}
.rb-note{font-size:12px;color:#166534;line-height:1.7;margin-bottom:10px;}
.rb-files{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.rb-file{font-size:11px;padding:3px 10px;border-radius:20px;background:#dcfce7;color:#15803d;font-weight:600;}
.out-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 16px;border-radius:9px;border:none;background:#111;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.out-btn:hover{opacity:.85;}
/* MCP連携デモ */
.mcp-section{margin-top:20px;border:1.5px solid #e5e5e5;border-radius:12px;overflow:hidden;display:none;}
.mcp-section.show{display:block;}
.mcp-header{background:#0f172a;padding:14px 18px;display:flex;align-items:center;gap:10px;}
.mcp-header-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse2 1.5s infinite;}
@keyframes pulse2{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.8;box-shadow:0 0 0 5px rgba(34,197,94,0)}}
.mcp-header-title{font-size:13px;font-weight:700;color:#fff;}
.mcp-header-sub{font-size:11px;color:rgba(255,255,255,.4);margin-left:auto;}
.mcp-body{padding:16px 18px;background:#f8fafc;}
.mcp-flow{display:flex;flex-direction:column;gap:0;}
.mcp-step{display:flex;gap:12px;opacity:0;transform:translateY(6px);transition:opacity .4s,transform .4s;}
.mcp-step.show{opacity:1;transform:none;}
.mcp-step-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0;}
.mcp-step-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.mcp-step-line{width:2px;flex:1;min-height:12px;background:#e0e7ff;margin:3px 0;}
.mcp-step-right{padding:2px 0 14px 0;flex:1;}
.mcp-step-action{font-size:11px;font-weight:700;color:#64748b;letter-spacing:.3px;margin-bottom:3px;}
.mcp-step-detail{font-size:12px;color:#334155;line-height:1.7;}
.mcp-tool-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin:2px 3px 2px 0;}
.mcp-result{background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-top:4px;font-size:12px;color:#334155;line-height:1.75;white-space:pre-wrap;}
.mcp-result-label{font-size:10px;font-weight:700;color:#64748b;margin-bottom:5px;letter-spacing:.3px;}
.mcp-tools-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.mcp-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b;}
/* ドキュメントプレビュー */
.doc-preview{margin-top:16px;border:1.5px solid #e5e5e5;border-radius:10px;overflow:hidden;display:none;}
.doc-preview.show{display:block;}
.doc-toolbar{background:#f5f5f3;border-bottom:1px solid #e5e5e5;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.doc-filename{font-size:12px;font-weight:700;color:#333;flex:1;}
.doc-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#fff;border:1px solid #ddd;color:#666;font-weight:600;}
.doc-page{background:#fff;margin:16px;border-radius:4px;box-shadow:0 1px 6px rgba(0,0,0,.1);padding:28px 30px;position:relative;}
.page-num{position:absolute;bottom:10px;right:16px;font-size:10px;color:#ccc;}
.doc-title{font-size:17px;font-weight:700;text-align:center;border-bottom:2px solid #1e3a8a;padding-bottom:10px;margin-bottom:14px;}
.doc-meta{font-size:11px;color:#888;text-align:right;margin-bottom:16px;}
.doc-h2{font-size:12px;font-weight:700;background:#1e3a8a;color:#fff;padding:5px 10px;border-radius:4px;margin:14px 0 8px;}
.doc-h3{font-size:12px;font-weight:700;color:#1e3a8a;border-left:3px solid #1e3a8a;padding-left:8px;margin:10px 0 5px;}
.doc-p{font-size:12px;color:#333;line-height:1.85;margin-bottom:7px;}
.doc-check span{display:block;font-size:12px;color:#333;line-height:1.85;padding:1px 0;}
.doc-warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:8px 10px;font-size:11px;color:#9a3412;margin:8px 0;line-height:1.7;}
.doc-hl{background:#fef9c3;border-left:3px solid #fbbf24;padding:8px 10px;font-size:11px;color:#78350f;margin:8px 0;line-height:1.7;}
.doc-tbl{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0;}
.doc-tbl th{background:#1e3a8a;color:#fff;padding:6px 8px;text-align:left;font-weight:700;}
.doc-tbl td{padding:6px 8px;border-bottom:1px solid #eee;color:#333;line-height:1.6;vertical-align:top;}
.doc-tbl tr:nth-child(even) td{background:#f9f9f7;}
.doc-mail{background:#f9f9f7;border:1px solid #e5e5e5;border-radius:7px;padding:12px 14px;font-size:12px;color:#333;line-height:1.85;}
.rerun-btn{margin-top:12px;width:100%;padding:9px;background:#fff;border:1.5px solid #ddd;border-radius:100px;font-size:13px;font-weight:700;color:#777;cursor:pointer;font-family:inherit;display:none;}
.rerun-btn:hover{background:#f5f5f5;}
hr{border:none;border-top:1px solid #eee;margin:48px 0;}
.footer{font-size:12px;color:#ccc;text-align:center;}
</style>
</head>

let cur=null,timers=[];
function clrT(){timers.forEach(t=>{clearTimeout(t);clearInterval(t);});timers=[];}

function sel(i){
  clrT();
  document.querySelectorAll('.dl-btn').forEach((b,j)=>b.classList.toggle('active',i===j));
  cur=i;run(D[i]);
}

function run(d){
  const win=document.getElementById('demoWin');
  win.className='demo-win show';
  win.innerHTML=`
    <div class="demo-bar">
      <div class="db-label">起動中のワークフロー</div>
      <div class="db-title">${d.icon} ${d.title}エージェント</div>
      <div class="db-docs">${d.docs.map(x=>`<span class="db-doc">${x}</span>`).join('')}</div>
    </div>
    <div class="demo-body">
      <div class="task-label">受け取ったタスク</div>
      <div class="task-text">${d.task}</div>
      <div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:#aaa;margin-bottom:10px;">エージェントが並列で動いています</div>
      <div class="agents-col" id="agCol"></div>
      <div class="result-box" id="resBox">
        <div class="rb-label">✅ 完了 — ${d.result.time}で全書類が揃いました（${d.result.saved}）</div>
        <div class="rb-note">${d.result.note}</div>
        <div class="rb-files">${d.result.files.map(f=>`<span class="rb-file">📄 ${f}</span>`).join('')}</div>
        <button class="out-btn" id="outBtn" onclick="showDoc(${D.indexOf(d)})">
          <span>📄　実際に出力する — 書類をここに表示</span>
        </button>
        ${d.mcpSteps?`<button class="out-btn" id="mcpBtn" style="background:#0f172a;margin-top:8px;" onclick="showMcp(${D.indexOf(d)})"><span>🔗　MCP連携デモ — Googleカレンダー・Gmailと繋いで動かす</span></button>`:''}
      </div>
      <div class="doc-preview" id="docPreview">
        <div class="doc-toolbar">
          <span class="doc-filename" id="docFn"></span>
          <span class="doc-badge">AIエージェント 自動生成</span>
        </div>
        <div id="docPages"></div>
      </div>
      <div class="mcp-section" id="mcpSection">
        <div class="mcp-header">
          <div class="mcp-header-dot"></div>
          <div class="mcp-header-title">MCP連携 — エージェントが外部ツールに直接アクセス</div>
          <div class="mcp-header-sub">リアルタイム接続中</div>
        </div>
        <div class="mcp-body">
          <div class="mcp-tools-legend" id="mcpLegend"></div>
          <div class="mcp-flow" id="mcpFlow"></div>
        </div>
      </div>
      <button class="rerun-btn" id="rerunBtn" onclick="sel(cur)">↩ もう一度見る</button>
    </div>`;

  const col=document.getElementById('agCol');
  d.agents.forEach((a,i)=>{
    const el=document.createElement('div');
    el.className='ag';el.id='ag'+i;
    el.innerHTML=`<div class="ag-head"><div class="ag-dot"></div><span class="ag-role" style="background:${a.rc};color:${a.rt}">${a.role}</span><span class="ag-name">${a.name}</span><span class="ag-st" id="st${i}">待機中</span></div><div class="ag-out"><div class="ag-out-inner"><div class="ag-doc"><div class="ag-doc-label">📄 出力：${a.doc}</div><div class="ag-doc-text" id="ot${i}"></div></div></div></div>`;
    col.appendChild(el);
    const s=300+i*60,e=2000+i*800;
    timers.push(setTimeout(()=>{el.classList.add('running');document.getElementById('st'+i).textContent=a.work;},s));
    timers.push(setTimeout(()=>{
      el.classList.remove('running');el.classList.add('done');
      document.getElementById('st'+i).textContent='完了';
      const ot=document.getElementById('ot'+i);let ci=0;
      const iv=setInterval(()=>{if(ci<a.out.length){ot.textContent+=a.out[ci++];}else clearInterval(iv);},9);
      timers.push(iv);
    },e));
  });
  const last=2000+(d.agents.length-1)*800+d.agents[d.agents.length-1].out.length*9+400;
  timers.push(setTimeout(()=>{
    document.getElementById('resBox').classList.add('show');
    document.getElementById('rerunBtn').style.display='block';
  },last));
}

function showMcp(idx){
  const d=D[idx];
  const btn=document.getElementById('mcpBtn');
  btn.textContent='⏳  接続中…';btn.style.opacity='.6';btn.disabled=true;

  // ツール凡例
  const legend=document.getElementById('mcpLegend');
  legend.innerHTML=[
    {icon:'📅',label:'Google Calendar MCP',bg:'#dbeafe',c:'#1e40af'},
    {icon:'📧',label:'Gmail MCP',bg:'#dcfce7',c:'#15803d'},
    {icon:'📄',label:'Google Drive MCP',bg:'#f3e8ff',c:'#7e22ce'},
  ].map(t=>`<div class="mcp-legend-item"><span style="background:${t.bg};color:${t.c};font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;">${t.icon} ${t.label}</span></div>`).join('');

  const flow=document.getElementById('mcpFlow');
  flow.innerHTML='';
  d.mcpSteps.forEach((s,i)=>{
    const isLast=i===d.mcpSteps.length-1;
    const el=document.createElement('div');
    el.className='mcp-step';
    el.innerHTML=`
      <div class="mcp-step-left">
        <div class="mcp-step-icon" style="background:${s.bg}">${s.icon}</div>
        ${!isLast?'<div class="mcp-step-line"></div>':''}
      </div>
      <div class="mcp-step-right">
        <div class="mcp-step-action">
          <span class="mcp-tool-tag" style="background:${s.toolBg};color:${s.toolC}">${s.tool}</span>
          ${s.action}
        </div>
        <div class="mcp-step-detail">${s.detail}</div>
        <div class="mcp-result" id="mr${i}" style="display:none">
          <div class="mcp-result-label">▶ 実行結果</div>
          <div id="mrt${i}"></div>
        </div>
      </div>`;
    flow.appendChild(el);

    timers.push(setTimeout(()=>{
      requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
    },s.delay));
    timers.push(setTimeout(()=>{
      const box=document.getElementById('mr'+i);
      box.style.display='block';
      const txt=document.getElementById('mrt'+i);
      let ci=0;
      const iv=setInterval(()=>{
        if(ci<s.result.length){txt.textContent+=s.result[ci++];}
        else clearInterval(iv);
      },10);
      timers.push(iv);
    },s.delay+600));
  });

  const sec=document.getElementById('mcpSection');
  sec.classList.add('show');
  btn.style.display='none';
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),400);
}

function showDoc(idx){
  const d=D[idx];
  const btn=document.getElementById('outBtn');
  btn.textContent='⏳  書類を展開中…';btn.style.opacity='.6';btn.disabled=true;
  setTimeout(()=>{
    document.getElementById('docFn').textContent='📄 '+d.docTitle;
    document.getElementById('docPages').innerHTML=d.docHtml;
    const prev=document.getElementById('docPreview');
    prev.classList.add('show');
    btn.style.display='none';
    prev.scrollIntoView({behavior:'smooth',block:'start'});
  },700);
}

const dl=document.getElementById('domList');
D.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='dl-btn';
  btn.innerHTML=`<span class="dl-icon">${d.icon}</span><div class="dl-info"><div class="dl-title">${d.title}</div><div class="dl-sub">${d.docs.join('・')}</div></div><span class="dl-time">${d.time}</span>`;
  btn.onclick=()=>sel(i);
  dl.appendChild(btn);
});
sel(0);
</script>

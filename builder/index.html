<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デモ生成ビルダー — シゴトAI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:15px;line-height:1.7;}
.wrap{max-width:640px;margin:0 auto;padding:32px 20px 80px;}
.top-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#aaa;margin-bottom:8px;}
h1{font-size:24px;font-weight:700;margin-bottom:4px;}
.sub{font-size:13px;color:#888;margin-bottom:28px;}

/* ステップバー */
.steps{display:flex;gap:0;margin-bottom:32px;border-radius:10px;overflow:hidden;border:1px solid #e0e0de;}
.step-item{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:700;color:#bbb;background:#fafaf8;cursor:pointer;border-right:1px solid #e0e0de;transition:all .15s;}
.step-item:last-child{border-right:none;}
.step-item.active{background:#111;color:#fff;}
.step-item.done{background:#f0fdf4;color:#16a34a;}
.step-num{display:block;font-size:16px;font-weight:700;margin-bottom:2px;}

/* パネル */
.panel{display:none;}
.panel.active{display:block;}

/* 業種カード */
.industry-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.ind-card{border:2px solid #e5e5e5;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;background:#fff;}
.ind-card:hover{border-color:#999;}
.ind-card.selected{border-color:#111;background:#111;color:#fff;}
.ind-card.selected .ind-sub{color:rgba(255,255,255,.5);}
.ind-icon{font-size:22px;margin-bottom:6px;}
.ind-name{font-size:14px;font-weight:700;}
.ind-sub{font-size:11px;color:#888;margin-top:2px;}

/* フォーム */
.field{margin-bottom:18px;}
.field label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:6px;letter-spacing:.3px;}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:14px;font-family:inherit;color:#1a1a1a;transition:border .15s;}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#333;}
.field textarea{resize:vertical;min-height:72px;line-height:1.65;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hint{font-size:11px;color:#aaa;margin-top:4px;}

/* レポートブロック */
.rpt-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.rpt-field-group{border:1px solid #e5e5e5;border-radius:8px;padding:12px;background:#fff;}
.rpt-field-group .block-label{font-size:11px;font-weight:700;color:#888;margin-bottom:8px;}
.rpt-field-group input{width:100%;padding:6px 8px;border-radius:6px;border:1px solid #ddd;font-size:13px;font-family:inherit;margin-bottom:5px;}
.rpt-field-group input:focus{outline:none;border-color:#333;}
.tag-row{display:flex;gap:6px;align-items:center;}
.tag-row select{flex:1;padding:5px 8px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:inherit;}

/* エージェント */
.agent-field{border:1px solid #e5e5e5;border-radius:8px;padding:12px;background:#fff;margin-bottom:10px;}
.agent-field .ag-head{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.agent-field .ag-num{font-size:11px;font-weight:700;color:#aaa;}
.agent-field input.ag-name{flex:1;padding:6px 10px;border-radius:6px;border:1px solid #ddd;font-size:13px;font-family:inherit;font-weight:700;}
.agent-field input.ag-name:focus{outline:none;border-color:#333;}
.agent-field textarea.ag-out{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;font-family:inherit;resize:vertical;min-height:64px;line-height:1.6;}
.agent-field textarea.ag-out:focus{outline:none;border-color:#333;}

/* ボタン */
.btn-row{display:flex;gap:10px;margin-top:24px;}
.btn{padding:12px 24px;border-radius:100px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-next{background:#111;color:#fff;}
.btn-next:hover{opacity:.85;}
.btn-back{background:#fff;color:#666;border:1px solid #ddd;}
.btn-back:hover{background:#f5f5f5;}
.btn-gen{background:#22c55e;color:#fff;font-size:16px;padding:14px 32px;}
.btn-gen:hover{opacity:.9;}

/* 生成後 */
.done-box{text-align:center;padding:32px 20px;}
.done-icon{font-size:48px;margin-bottom:16px;}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.done-sub{font-size:14px;color:#666;margin-bottom:24px;}
.dl-btn{display:inline-block;padding:14px 32px;background:#111;color:#fff;border-radius:100px;font-size:15px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit;}
.dl-btn:hover{opacity:.85;}
.another-btn{display:inline-block;margin-top:12px;padding:10px 24px;border-radius:100px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-label">シゴトAI — デモ生成ビルダー</div>
  <h1>タブを進むだけで<br>カスタムデモが完成</h1>
  <p class="sub">5ステップで見込み客専用のデモHTMLを自動生成します。</p>

  <div class="steps">
    <div class="step-item active" id="st0"><span class="step-num">1</span>業種</div>
    <div class="step-item" id="st1"><span class="step-num">2</span>基本情報</div>
    <div class="step-item" id="st2"><span class="step-num">3</span>理念</div>
    <div class="step-item" id="st3"><span class="step-num">4</span>レポート</div>
    <div class="step-item" id="st4"><span class="step-num">5</span>タスク</div>
    <div class="step-item" id="st5"><span class="step-num">✓</span>生成</div>
  </div>

  <!-- STEP 1: 業種 -->
  <div class="panel active" id="p0">
    <div class="industry-grid" id="indGrid"></div>
    <div class="btn-row"><button class="btn btn-next" onclick="next(0)">次へ →</button></div>
  </div>

  <!-- STEP 2: 基本情報 -->
  <div class="panel" id="p1">
    <div class="field"><label>会社名・クリニック名・事務所名</label><input type="text" id="companyName" placeholder="例：○○コンサルティング事務所"></div>
    <div class="field field-row">
      <div><label>スタッフ数（名）</label><input type="number" id="staffNum" min="1" max="500" value="3"></div>
      <div><label>月売上（万円）</label><input type="number" id="revenueM" min="50" max="100000" value="350"></div>
    </div>
    <div class="field"><label>代表者の役職・呼称</label><input type="text" id="ownerTitle" placeholder="例：代表、院長、所長"></div>
    <div class="btn-row"><button class="btn btn-back" onclick="back(1)">← 戻る</button><button class="btn btn-next" onclick="next(1)">次へ →</button></div>
  </div>

  <!-- STEP 3: 理念 -->
  <div class="panel" id="p2">
    <p style="font-size:13px;color:#888;margin-bottom:16px;">5つの理念・行動原則を編集してください。そのままでも使えます。</p>
    <div id="philFields"></div>
    <div class="btn-row"><button class="btn btn-back" onclick="back(2)">← 戻る</button><button class="btn btn-next" onclick="next(2)">次へ →</button></div>
  </div>

  <!-- STEP 4: レポート -->
  <div class="panel" id="p3">
    <p style="font-size:13px;color:#888;margin-bottom:16px;">月次レポートの6項目を編集してください。</p>
    <div class="rpt-fields" id="rptFields"></div>
    <div class="btn-row"><button class="btn btn-back" onclick="back(3)">← 戻る</button><button class="btn btn-next" onclick="next(3)">次へ →</button></div>
  </div>

  <!-- STEP 5: タスク -->
  <div class="panel" id="p4">
    <div class="field">
      <label>経営者から届くタスク文（1〜2文）</label>
      <textarea id="taskText" rows="3"></textarea>
      <div class="hint">AIエージェントが受け取る「指示」として画面に表示されます</div>
    </div>
    <p style="font-size:12px;font-weight:700;color:#555;margin-bottom:10px;margin-top:4px;">6体のエージェント名と出力内容</p>
    <div id="agentFields"></div>
    <div class="btn-row"><button class="btn btn-back" onclick="back(4)">← 戻る</button><button class="btn btn-gen" onclick="generate()">デモを生成する ✓</button></div>
  </div>

  <!-- STEP 6: 完成 -->
  <div class="panel" id="p5">
    <div class="done-box">
      <div class="done-icon">🎉</div>
      <div class="done-title">デモが完成しました</div>
      <div class="done-sub">ファイルをダウンロードして<br>そのままLINEやメールで送れます</div>
      <button class="dl-btn" id="dlBtn">HTMLをダウンロード</button><br>
      <button class="another-btn" onclick="restart()">別の会社でもう一度作る</button>
    </div>
  </div>
</div>

let selected = 'consulting';
let step = 0;

function init(){
  const grid = document.getElementById('indGrid');
  Object.entries(PRESETS).forEach(([key, p])=>{
    const d = document.createElement('div');
    d.className = 'ind-card' + (key===selected?' selected':'');
    d.innerHTML = `<div class="ind-icon">${p.icon}</div><div class="ind-name">${p.label}</div><div class="ind-sub">${p.sub}</div>`;
    d.onclick = ()=>selectInd(key);
    d.id = 'ind_'+key;
    grid.appendChild(d);
  });
  loadPreset();
}

function selectInd(key){
  document.querySelectorAll('.ind-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('ind_'+key).classList.add('selected');
  selected = key;
  loadPreset();
}

function loadPreset(){
  const p = PRESETS[selected];
  document.getElementById('staffNum').value = p.staffNum;
  document.getElementById('revenueM').value = p.revenueM;
  document.getElementById('ownerTitle').value = p.ownerTitle;

  // phil
  const pf = document.getElementById('philFields');
  pf.innerHTML = '';
  p.phil.forEach((item, i)=>{
    pf.innerHTML += `<div class="field"><label>${item.icon} 原則 ${i+1}（${item.label}）</label><textarea id="phil_${i}">${item.text}</textarea></div>`;
  });

  // rpt
  const rf = document.getElementById('rptFields');
  rf.innerHTML = '';
  p.rpt.forEach((r,i)=>{
    rf.innerHTML += `<div class="rpt-field-group"><div class="block-label">ブロック ${i+1}</div>
      <input type="text" id="rbl_${i}" placeholder="ラベル" value="${r.label}">
      <input type="text" id="rbm_${i}" placeholder="メイン数値" value="${r.main}">
      <input type="text" id="rbs_${i}" placeholder="サブテキスト" value="${r.sub}">
      <div class="tag-row">
        <input type="text" id="rbt_${i}" placeholder="タグ" value="${r.tag}">
        <select id="rbtt_${i}"><option value="up"${r.tagType==='up'?' selected':''}>↑良好</option><option value="warn"${r.tagType==='warn'?' selected':''}>△注意</option><option value="down"${r.tagType==='down'?' selected':''}>↓警告</option></select>
      </div></div>`;
  });

  // task
  document.getElementById('taskText').value = p.task;

  // agents
  const af = document.getElementById('agentFields');
  af.innerHTML = '';
  p.agents.forEach((a,i)=>{
    af.innerHTML += `<div class="agent-field"><div class="ag-head"><span class="ag-num">エージェント ${i+1}</span><input type="text" class="ag-name" id="aname_${i}" value="${a.name}"></div><textarea class="ag-out" id="aout_${i}" rows="3">${a.output}</textarea></div>`;
  });
}

function goStep(n){
  document.getElementById('p'+step).classList.remove('active');
  document.getElementById('st'+step).classList.remove('active');
  document.getElementById('st'+step).classList.add('done');
  step = n;
  document.getElementById('p'+step).classList.add('active');
  document.getElementById('st'+step).classList.remove('done');
  document.getElementById('st'+step).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function next(s){ goStep(s+1); }
function back(s){
  document.getElementById('p'+step).classList.remove('active');
  document.getElementById('st'+step).classList.remove('active','done');
  step = s-1;
  document.getElementById('p'+step).classList.add('active');
  document.getElementById('st'+step).classList.add('active');
  document.getElementById('st'+step).classList.remove('done');
  window.scrollTo({top:0,behavior:'smooth'});
}

function getVals(){
  const p = PRESETS[selected];
  const companyName = document.getElementById('companyName').value || p.label+'の会社';
  const ownerTitle = document.getElementById('ownerTitle').value || p.ownerTitle;
  const staffNum = document.getElementById('staffNum').value || p.staffNum;
  const revenueM = document.getElementById('revenueM').value || p.revenueM;
  const phil = p.phil.map((item,i)=>({icon:item.icon, label:item.label, text:document.getElementById('phil_'+i)?.value||item.text}));
  const rpt = p.rpt.map((r,i)=>({label:document.getElementById('rbl_'+i)?.value||r.label, main:document.getElementById('rbm_'+i)?.value||r.main, sub:document.getElementById('rbs_'+i)?.value||r.sub, tag:document.getElementById('rbt_'+i)?.value||r.tag, tagType:document.getElementById('rbtt_'+i)?.value||r.tagType}));
  const task = document.getElementById('taskText').value || p.task;
  const agents = p.agents.map((a,i)=>({role:a.role, name:document.getElementById('aname_'+i)?.value||a.name, output:document.getElementById('aout_'+i)?.value||a.output}));
  return {companyName, ownerTitle, staffNum, revenueM, phil, rpt, task, agents, industry:selected};
}

function generate(){
  const v = getVals();
  const html = buildHTML(v);
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  document.getElementById('dlBtn').onclick = ()=>{
    const a = document.createElement('a');
    a.href = url;
    a.download = `demo_${v.companyName.replace(/\s/g,'_')}.html`;
    a.click();
  };
  goStep(5);
}

function restart(){
  location.reload();
}

.report-status.done{color:#16a34a;font-weight:700;}
.report-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:440px){.report-body{grid-template-columns:1fr;}}
.rpt-block{border:1px solid #f0f0ee;border-radius:8px;padding:10px 12px;position:relative;transition:border-color .3s,background .3s;}
.rpt-block.scanning{border-color:#fbbf24;background:#fffbeb;}
.rpt-block.scanned{border-color:#bbf7d0;background:#f0fdf4;}
.rpt-block-label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#aaa;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.rpt-main{font-size:17px;font-weight:700;color:#111;line-height:1.2;margin-bottom:3px;}
.rpt-sub{font-size:11px;color:#666;line-height:1.5;}
.rpt-tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-top:3px;}
.rpt-tag.up{background:#dcfce7;color:#15803d;}
.rpt-tag.warn{background:#fef9c3;color:#854d0e;}
.rpt-tag.down{background:#fee2e2;color:#991b1b;}
.task-box{background:#f7f7f5;border-left:3px solid #111;border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:24px;opacity:0;transform:translateY(4px);transition:opacity .4s,transform .4s;}
.task-box.show{opacity:1;transform:none;}
.task-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.task-text{font-size:15px;color:#111;line-height:1.7;font-weight:500;}
.log-area{margin-bottom:20px;min-height:60px;}
.log-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s;}
.log-line.show{opacity:1;transform:none;}
.log-who{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:#f0f0ee;color:#666;}
.log-text{font-size:13px;color:#333;line-height:1.65;}
.agents-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.agent-card{border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;transition:border-color .4s,box-shadow .4s;}
.agent-card.active{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.08);}
.agent-card.done{border-color:#22c55e;}
.agent-head{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.agent-dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:background .3s;flex-shrink:0;}
.agent-card.active .agent-dot{background:#3b82f6;animation:pulse .9s infinite;}
.agent-card.done .agent-dot{background:#22c55e;animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.agent-role{font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;}
.agent-name{font-size:13px;font-weight:700;color:#111;}
.agent-status{font-size:12px;color:#aaa;margin-left:auto;}
.agent-card.active .agent-status{color:#3b82f6;}
.agent-card.done .agent-status{color:#22c55e;}
.agent-output{max-height:0;overflow:hidden;transition:max-height .5s ease;}
.agent-card.done .agent-output{max-height:200px;}
.agent-output-inner{padding:0 14px 12px 14px;border-top:1px solid #f0f0f0;margin-top:0;}
.agent-output-text{font-size:13px;color:#444;line-height:1.8;padding-left:12px;border-left:2px solid #22c55e;margin-top:10px;}
.synthesis-box{background:#f7f7f5;border-radius:12px;padding:20px 22px;display:none;margin-bottom:20px;}
.synthesis-box.show{display:block;}
.synthesis-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#22c55e;margin-bottom:12px;}
.synthesis-text{font-size:13px;color:#333;line-height:2;white-space:pre-wrap;}
.restart-btn{width:100%;padding:12px;font-size:14px;font-weight:700;border-radius:100px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;display:none;transition:all .15s;}
.restart-btn:hover{background:#f5f5f5;}
.progress-bar-wrap{height:3px;background:#f0f0f0;border-radius:2px;margin-bottom:20px;overflow:hidden;display:none;}
.progress-bar-wrap.show{display:block;}
.progress-bar{height:100%;background:#3b82f6;border-radius:2px;width:0;transition:width .3s linear;}
</style>
</head>
<body>
<div class="page">
<div class="doc-eyebrow">AIエージェント 自律動作デモ</div>
<h1>6体が自分で考えて、<br>同時に動く</h1>
<p class="doc-lead">${v.ownerTitle}から1つのタスクが届いた瞬間、AIエージェントたちが自律的に役割分担して動き始めます。指示は1回だけ。</p>

<div class="philosophy-box" id="philBox">
  <div class="phil-head">
    <span id="philSpinner" class="spinner"></span>
    <div class="phil-badge" id="philBadge">${v.companyName}の理念・行動原則を読み込み中</div>
    <div class="phil-status" id="philStatus">全エージェントに配布中…</div>
  </div>
  <div class="phil-body" id="philBody"></div>
</div>

<div class="report-box" id="reportBox">
  <div class="report-head">
    <span id="rptSpinner" class="spinner spinner-amber"></span>
    <div class="report-badge" id="rptBadge">直近の業務レポートを読み込み中</div>
    <div class="report-status" id="rptStatus">スキャン中…</div>
  </div>
  <div class="report-body">${rptBlocks}</div>
</div>

<div class="task-box" id="taskBox">
  <div class="task-label">${v.ownerTitle}からのタスク（これだけ渡す）</div>
  <div class="task-text">${v.task}</div>
</div>

<div class="progress-bar-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="log-area" id="logArea"></div>

<div class="agents-grid">${agentCardsHTML}</div>

<div class="synthesis-box" id="synthBox">
  <div class="synthesis-label">統合レポート — 全エージェント完了</div>
  <div class="synthesis-text" id="synthText"></div>
</div>

<button class="restart-btn" id="restartBtn" onclick="restart()">もう一度見る</button>
</div>

<script>
const philItems=${philJS};
const agents=${agentsJS};
const logs=[
  {delay:400,text:'タスクを受信。業務レポートの数値と理念を照合し、並列処理を開始。'},
  {delay:1700,text:'6体のエージェントを起動。データを配布して同時分析を開始します。'},
];
const synthContent=${JSON.stringify(synthText)};
let timers=[];
function addLog(text){const area=document.getElementById('logArea');const div=document.createElement('div');div.className='log-line';div.innerHTML='<div class="log-who">Orchestrator</div><div class="log-text">'+text+'</div>';area.appendChild(div);requestAnimationFrame(()=>requestAnimationFrame(()=>div.classList.add('show')));}
function setActive(i){document.getElementById('ag'+i).classList.add('active');document.getElementById('s'+i).textContent=agents[i].working;}
function setDone(i){const c=document.getElementById('ag'+i);c.classList.remove('active');c.classList.add('done');document.getElementById('s'+i).textContent='完了';document.getElementById('o'+i).textContent=agents[i].output;}
function typeText(el,text,cb){let i=0;const iv=setInterval(()=>{if(i<text.length){el.textContent+=text[i++];}else{clearInterval(iv);if(cb)cb();}},13);timers.push(iv);}
function updateProgress(){const total=12000;const bar=document.getElementById('progressBar');document.getElementById('progressWrap').classList.add('show');let start=null;function step(ts){if(!start)start=ts;const pct=Math.min((ts-start)/total*100,100);bar.style.width=pct+'%';if(pct<100)requestAnimationFrame(step);}requestAnimationFrame(step);}
function runPhilosophy(cb){const box=document.getElementById('philBox');requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.add('show')));const body=document.getElementById('philBody');philItems.forEach((item,i)=>{const div=document.createElement('div');div.className='phil-item';div.innerHTML='<span class="phil-icon">'+item.icon+'</span><span>'+item.text+'</span>';body.appendChild(div);timers.push(setTimeout(()=>requestAnimationFrame(()=>requestAnimationFrame(()=>div.classList.add('show'))),500+i*400));});const DONE_AT=500+philItems.length*400+400;timers.push(setTimeout(()=>{document.getElementById('philSpinner').style.display='none';const badge=document.getElementById('philBadge');badge.textContent='✓ 理念・行動原則を読み込みました';badge.style.color='#15803d';const st=document.getElementById('philStatus');st.textContent='全エージェントに配布完了';st.classList.add('done');box.style.borderColor='#86efac';box.querySelector('.phil-head').style.background='#f0fdf4';box.querySelector('.phil-head').style.borderColor='#86efac';},DONE_AT));timers.push(setTimeout(cb,DONE_AT+600));}
function runReport(cb){const box=document.getElementById('reportBox');requestAnimationFrame(()=>requestAnimationFrame(()=>box.classList.add('show')));for(let i=0;i<6;i++){timers.push(setTimeout((idx=>()=>{const rb=document.getElementById('rb'+idx);const ri=document.getElementById('ri'+idx);rb.classList.add('scanning');ri.textContent='◎';timers.push(setTimeout(()=>{rb.classList.remove('scanning');rb.classList.add('scanned');ri.textContent='✓';},500));})(i),400+i*380));}const DONE_AT=400+6*380+600;timers.push(setTimeout(()=>{document.getElementById('rptSpinner').style.display='none';const badge=document.getElementById('rptBadge');badge.textContent='✓ 業務レポートを読み込みました';badge.style.color='#15803d';const st=document.getElementById('rptStatus');st.textContent='6項目を分析完了';st.classList.add('done');box.style.borderColor='#86efac';box.querySelector('.report-head').style.background='#f0fdf4';box.querySelector('.report-head').style.borderColor='#86efac';},DONE_AT));timers.push(setTimeout(()=>requestAnimationFrame(()=>requestAnimationFrame(()=>document.getElementById('taskBox').classList.add('show'))),DONE_AT+500));timers.push(setTimeout(cb,DONE_AT+1100));}
function startDemo(){updateProgress();logs.forEach(l=>timers.push(setTimeout(()=>addLog(l.text),l.delay)));agents.forEach((a,i)=>{timers.push(setTimeout(()=>setActive(i),a.start));timers.push(setTimeout(()=>setDone(i),a.end));});const lastEnd=Math.max(...agents.map(a=>a.end));timers.push(setTimeout(()=>{document.getElementById('synthBox').classList.add('show');typeText(document.getElementById('synthText'),synthContent,()=>{document.getElementById('restartBtn').style.display='block';});},lastEnd+600));}
function restart(){timers.forEach(t=>{clearTimeout(t);clearInterval(t);});timers=[];document.getElementById('logArea').innerHTML='';for(let i=0;i<6;i++){const c=document.getElementById('ag'+i);c.classList.remove('active','done');document.getElementById('s'+i).textContent='待機中';document.getElementById('o'+i).textContent='';}document.getElementById('synthBox').classList.remove('show');document.getElementById('synthText').textContent='';document.getElementById('restartBtn').style.display='none';document.getElementById('progressBar').style.width='0';const pb=document.getElementById('philBox');pb.classList.remove('show');pb.style.borderColor='';pb.querySelector('.phil-head').style.background='';pb.querySelector('.phil-head').style.borderColor='';document.getElementById('philSpinner').style.display='';const pbadge=document.getElementById('philBadge');pbadge.textContent='${v.companyName}の理念・行動原則を読み込み中';pbadge.style.color='';document.getElementById('philStatus').textContent='全エージェントに配布中…';document.getElementById('philStatus').classList.remove('done');document.getElementById('philBody').innerHTML='';const rb=document.getElementById('reportBox');rb.classList.remove('show');rb.style.borderColor='';rb.querySelector('.report-head').style.background='';rb.querySelector('.report-head').style.borderColor='';document.getElementById('rptSpinner').style.display='';const rbadge=document.getElementById('rptBadge');rbadge.textContent='直近の業務レポートを読み込み中';rbadge.style.color='';document.getElementById('rptStatus').textContent='スキャン中…';document.getElementById('rptStatus').classList.remove('done');for(let i=0;i<6;i++){const block=document.getElementById('rb'+i);block.classList.remove('scanning','scanned');document.getElementById('ri'+i).textContent='○';}document.getElementById('taskBox').classList.remove('show');setTimeout(()=>runPhilosophy(()=>runReport(startDemo)),400);}
runPhilosophy(()=>runReport(startDemo));
<\/script>
</body>
</html>`;
}

init();
</script>
</body>
</html>
